document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px 14px;font:600 12px 'Public Sans',sans-serif;border:none;background:transparent;color:#56535F;border-radius:7px;cursor:pointer;white-space:nowrap;\">+5%<\u002Fbutton>\n          <button data-strike=\"+10%\" onclick=\"{{ onStrike }}\" style=\"padding:6px 14px;font:600 12px 'Public Sans',sans-serif;border:none;background:transparent;color:#56535F;border-radius:7px;cursor:pointer;white-space:nowrap;\">+10%<\u002Fbutton>\n          <button data-strike=\"+15%\" onclick=\"{{ onStrike }}\" style=\"padding:6px 14px;font:600 12px 'Public Sans',sans-serif;border:none;background:transparent;color:#56535F;border-radius:7px;cursor:pointer;white-space:nowrap;\">+15%<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:28px;background:#E7E3DB;\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;\">\n        <span style=\"font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9A97A3;\">Vista<\u002Fspan>\n        <div ref=\"{{ viewRef }}\" style=\"display:inline-flex;gap:3px;padding:3px;background:#F1EEE8;border:1px solid #E7E3DB;border-radius:10px;\">\n          <button data-view=\"total\" onclick=\"{{ onView }}\" style=\"padding:6px 14px;font:600 12px 'Public Sans',sans-serif;border:none;background:transparent;color:#56535F;border-radius:7px;cursor:pointer;white-space:nowrap;\">Costo Total<\u002Fbutton>\n          <button data-view=\"prima\" onclick=\"{{ onView }}\" style=\"padding:6px 14px;font:600 12px 'Public Sans',sans-serif;border:none;background:transparent;color:#56535F;border-radius:7px;cursor:pointer;white-space:nowrap;\">Sólo Prima<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:28px;background:#E7E3DB;\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:11px;\">\n        <span style=\"font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9A97A3;\">Nocional<\u002Fspan>\n        <input type=\"range\" min=\"1\" max=\"10\" step=\"0.5\" value=\"1\" oninput=\"{{ onNotional }}\" style=\"width:140px;accent-color:#6C3CE0;cursor:pointer;\">\n        <span ref=\"{{ notValRef }}\" style=\"font-size:14px;font-weight:800;color:#1B1A22;min-width:66px;font-variant-numeric:tabular-nums;\">USD 1M<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MAIN GRID: chart + winners rail -->\n    <div style=\"display:grid;grid-template-columns:1fr 322px;gap:18px;margin-bottom:18px;align-items:start;\">\n\n      <div style=\"background:#fff;border:1px solid #EAE6DE;border-radius:14px;padding:18px 20px 16px;box-shadow:0 1px 3px rgba(20,18,30,.04);\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n          <div>\n            <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:17px;color:#1B1A22;line-height:1;\">Costo %/año por plazo<\u002Fdiv>\n            <div ref=\"{{ subRef }}\" style=\"font-size:11px;color:#9A97A3;margin-top:4px;font-weight:500;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div ref=\"{{ avgRef }}\" style=\"display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;height:300px;margin-top:14px;\">\n          <canvas ref=\"{{ chartRef }}\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center;gap:18px;margin-top:6px;flex-wrap:wrap;\">\n          <div style=\"display:flex;align-items:center;gap:6px;font-size:11px;color:#56535F;font-weight:500;\"><span style=\"width:16px;height:3px;border-radius:2px;background:#A85A5A;display:inline-block;\"><\u002Fspan>Banco Bogotá<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:6px;font-size:11px;color:#56535F;font-weight:500;\"><span style=\"width:16px;height:3px;border-radius:2px;background:#5B73A8;display:inline-block;\"><\u002Fspan>BBVA<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:6px;font-size:11px;color:#56535F;font-weight:500;\"><span style=\"width:16px;height:3px;border-radius:2px;background:#3F8C78;display:inline-block;\"><\u002Fspan>JPMorgan<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:6px;font-size:11px;color:#56535F;font-weight:500;\"><span style=\"width:16px;height:3px;border-radius:2px;background:#9C7A45;display:inline-block;\"><\u002Fspan>Bancolombia<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:6px;font-size:11px;color:#56535F;font-weight:500;\"><span style=\"width:16px;height:0;border-top:2px dashed #B8B4AD;display:inline-block;\"><\u002Fspan>Promedio<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <div style=\"font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9A97A3;\">Banco más barato por plazo<\u002Fdiv>\n        <div ref=\"{{ winnersRef }}\" style=\"display:flex;flex-direction:column;gap:10px;\"><\u002Fdiv>\n        <div ref=\"{{ noteRef }}\" style=\"background:#F7F4FE;border:1px solid #E9E2FB;border-left:3px solid #6C3CE0;border-radius:0 11px 11px 0;padding:12px 14px;font-size:11.5px;color:#56535F;line-height:1.55;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CHART 2: strike -->\n    <div style=\"background:#fff;border:1px solid #EAE6DE;border-radius:14px;padding:18px 20px 16px;margin-bottom:18px;box-shadow:0 1px 3px rgba(20,18,30,.04);\">\n      <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px;\">\n        <div>\n          <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:17px;color:#1B1A22;line-height:1;\">Costo %/año vs Strike<\u002Fdiv>\n          <div ref=\"{{ sub2Ref }}\" style=\"font-size:11px;color:#9A97A3;margin-top:4px;font-weight:500;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <span style=\"font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#9A97A3;\">Plazo<\u002Fspan>\n          <div ref=\"{{ matRef }}\" style=\"display:inline-flex;gap:3px;padding:3px;background:#F1EEE8;border:1px solid #E7E3DB;border-radius:10px;\">\n            <button data-mat=\"0\" onclick=\"{{ onMat }}\" style=\"padding:6px 14px;font:600 12px 'Public Sans',sans-serif;border:none;background:transparent;color:#56535F;border-radius:7px;cursor:pointer;white-space:nowrap;\">540 días<\u002Fbutton>\n            <button data-mat=\"1\" onclick=\"{{ onMat }}\" style=\"padding:6px 14px;font:600 12px 'Public Sans',sans-serif;border:none;background:transparent;color:#56535F;border-radius:7px;cursor:pointer;white-space:nowrap;\">720 días<\u002Fbutton>\n            <button data-mat=\"2\" onclick=\"{{ onMat }}\" style=\"padding:6px 14px;font:600 12px 'Public Sans',sans-serif;border:none;background:transparent;color:#56535F;border-radius:7px;cursor:pointer;white-space:nowrap;\">1,080 días<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;height:268px;margin-top:10px;\">\n        <canvas ref=\"{{ chart2Ref }}\"><\u002Fcanvas>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TABLE -->\n    <div style=\"background:#fff;border:1px solid #EAE6DE;border-radius:14px;padding:18px 20px 20px;box-shadow:0 1px 3px rgba(20,18,30,.04);\">\n      <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:17px;color:#1B1A22;margin-bottom:4px;\">Desglose de componentes por plazo<\u002Fdiv>\n      <div style=\"font-size:11px;color:#9A97A3;margin-bottom:14px;font-weight:500;\">Valor nominal escalado al nocional · porcentaje anualizado entre paréntesis<\u002Fdiv>\n      <table style=\"width:100%;border-collapse:collapse;font-family:'Public Sans',sans-serif;\">\n        <thead>\n          <tr>\n            <th style=\"padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#9A97A3;border-bottom:1.5px solid #E7E3DB;text-align:left;width:22%;\">Concepto<\u002Fth>\n            <th style=\"padding:8px 12px;font-size:11px;font-weight:700;border-bottom:1.5px solid #E7E3DB;text-align:center;color:#A85A5A;\">Banco Bogotá<\u002Fth>\n            <th style=\"padding:8px 12px;font-size:11px;font-weight:700;border-bottom:1.5px solid #E7E3DB;text-align:center;color:#5B73A8;\">BBVA<\u002Fth>\n            <th style=\"padding:8px 12px;font-size:11px;font-weight:700;border-bottom:1.5px solid #E7E3DB;text-align:center;color:#3F8C78;\">JPMorgan<\u002Fth>\n            <th style=\"padding:8px 12px;font-size:11px;font-weight:700;border-bottom:1.5px solid #E7E3DB;text-align:center;color:#9C7A45;\">Bancolombia<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody ref=\"{{ tbodyRef }}\"><\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#6C3CE0&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showDataLabels&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nconst BANKS = [\n  { key:'bog',  name:'Banco Bogotá', color:'#A85A5A', spot:3440, yr1:1.47671 },\n  { key:'bbva', name:'BBVA',         color:'#5B73A8', spot:3430, yr1:1.48219 },\n  { key:'jpm',  name:'JPMorgan',     color:'#3F8C78', spot:3425, yr1:1.47945 },\n  { key:'bcol', name:'Bancolombia',  color:'#9C7A45', spot:3435, yr1:1.48219 }\n];\nconst MATS = [\n  { label:'540 días',   yr2:null },\n  { label:'720 días',   yr2:1.97260 },\n  { label:'1,080 días', yr2:2.95890 }\n];\nconst PRIMA_COP = {\n  'ATM':  { bog:[494.44,584.66,759.52], bbva:[476.42,572.81,727.53], jpm:[452.10,554.85,698.70], bcol:[479.33,585.71,760.20] },\n  '+5%':  { bog:[399.54,490.59,669.65], bbva:[374.44,468.72,625.55], jpm:[363.05,454.84,607.94], bcol:[384.96,489.57,671.77] },\n  '+10%': { bog:[319.96,408.26,586.82], bbva:[291.08,379.25,531.87], jpm:[287.70,373.33,528.82], bcol:[307.80,410.41,589.43] },\n  '+15%': { bog:[255.30,338.43,511.78], bbva:[225.57,305.08,448.96], jpm:[224.34,306.17,452.79], bcol:[246.01,341.80,518.71] }\n};\nconst OTM_COP = {\n  'ATM':  { bog:0,   bbva:0,     jpm:0,      bcol:0      },\n  '+5%':  { bog:172, bbva:171.5, jpm:171.25, bcol:171.75 },\n  '+10%': { bog:344, bbva:343,   jpm:342.5,  bcol:343.50 },\n  '+15%': { bog:516, bbva:514.5, jpm:513.75, bcol:515.25 }\n};\nconst NOTES = {\n  'ATM':  'ATM: el costo total equivale a la prima pura. JPMorgan es el más barato; Bancolombia se ubica entre BBVA y Bogotá.',\n  '+5%':  '+5% OTM: el componente de strike se amortiza con el plazo. Bancolombia y Bogotá son comparables.',\n  '+10%': '+10% OTM: JPM y BBVA convergen; Bancolombia se acerca a Bogotá. El strike domina en el corto plazo.',\n  '+15%': '+15% OTM: JPM y BBVA casi idénticos; Bancolombia y Bogotá forman el grupo caro, ~0.5pp por encima.'\n};\nconst MONEY = ['ATM','+5%','+10%','+15%'];\nconst DL_POS = [\n  { align:'top',    anchor:'end',    offset:6 },\n  { align:'right',  anchor:'center', offset:8 },\n  { align:'bottom', anchor:'end',    offset:6 },\n  { align:'left',   anchor:'center', offset:8 }\n];\n\nfunction getYr(bi, mi){ return mi === 0 ? BANKS[bi].yr1 : MATS[mi].yr2; }\nfunction fmtCOP(v){ if (v >= 1e9) return (v/1e9).toFixed(2)+' Bn'; return (v/1e6).toFixed(1)+' M'; }\nfunction computeBanks(money){\n  return BANKS.map((b, bi) => Object.assign({}, b, {\n    prima_cop: MATS.map((_,mi) => PRIMA_COP[money][b.key][mi]),\n    otm_cop:   MATS.map(()    => OTM_COP[money][b.key]),\n    total_cop: MATS.map((_,mi) => PRIMA_COP[money][b.key][mi] + OTM_COP[money][b.key]),\n    prima_pct: MATS.map((_,mi) => PRIMA_COP[money][b.key][mi] / getYr(bi,mi) / b.spot * 100),\n    total_pct: MATS.map((_,mi) => (PRIMA_COP[money][b.key][mi] + OTM_COP[money][b.key]) / getYr(bi,mi) / b.spot * 100)\n  }));\n}\n\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = { strike:'ATM', view:'total', notional:1, mat:0 };\n    ['chartRef','chart2Ref','tbodyRef','winnersRef','avgRef','noteRef','notValRef',\n     'strikeRef','viewRef','matRef','subRef','sub2Ref'].forEach(r => this[r] = React.createRef());\n    this.ready = false;\n  }\n\n  get accent(){ return this.props.accent || '#6C3CE0'; }\n  get showDL(){ return this.props.showDataLabels !== false; }\n\n  componentDidMount(){\n    this._poll = setInterval(() => {\n      if (window.Chart && window.ChartDataLabels){ clearInterval(this._poll); this.init(); }\n    }, 60);\n  }\n  componentWillUnmount(){\n    clearInterval(this._poll);\n    if (this.chart) this.chart.destroy();\n    if (this.chart2) this.chart2.destroy();\n  }\n\n  init(){\n    Chart.register(ChartDataLabels);\n    Chart.defaults.font.family = \"'Public Sans', system-ui, sans-serif\";\n    this.buildCharts();\n    this.ready = true;\n    this.refresh();\n    this._last = Object.assign({}, this.state);\n  }\n\n  scheduleSync(){\n    if (this._raf) clearTimeout(this._raf);\n    this._raf = setTimeout(() => { this._raf = null; this.sync(); }, 0);\n  }\n  sync(){\n    if (!this.ready) return;\n    const s = this.state, prev = this._last || {};\n    const onlyNot = prev.strike===s.strike && prev.view===s.view &&\n                    prev.mat===s.mat && prev.notional!==s.notional;\n    if (onlyNot){ this.renderTable(); this.updateNotVal(); }\n    else this.refresh();\n    this._last = Object.assign({}, s);\n  }\n\n  chartOptions(){\n    return {\n      responsive:true, maintainAspectRatio:false,\n      animation:{ duration:320, easing:'easeInOutQuart' },\n      interaction:{ mode:'index', intersect:false },\n      layout:{ padding:{ top:26, right:34, bottom:4, left:4 } },\n      plugins:{\n        legend:{ display:false },\n        title:{ display:false },\n        datalabels:{ display:true },\n        tooltip:{\n          backgroundColor:'#1B1A22', titleColor:'#B6B2BF', bodyColor:'#F5F2EC',\n          padding:11, cornerRadius:8, borderColor:'rgba(255,255,255,.06)', borderWidth:1,\n          titleFont:{ weight:'700', size:11 }, bodyFont:{ size:12 },\n          callbacks:{ label: c => `  ${c.dataset.label}: ${c.parsed.y.toFixed(2)}% / año` }\n        }\n      },\n      scales:{\n        x:{ grid:{ display:false }, border:{ color:'#E7E3DB' }, ticks:{ font:{ size:11.5, weight:'600' }, color:'#56535F', padding:6 } },\n        y:{ grid:{ color:'#F1EEE8' }, border:{ display:false }, ticks:{ font:{ size:11 }, color:'#9A97A3', padding:6, callback:v => v.toFixed(1)+'%' } }\n      }\n    };\n  }\n\n  buildCharts(){\n    this.chart = new Chart(this.chartRef.current.getContext('2d'), {\n      type:'line', data:{ labels: MATS.map(m => m.label), datasets:[] }, options:this.chartOptions()\n    });\n    this.chart2 = new Chart(this.chart2Ref.current.getContext('2d'), {\n      type:'line', data:{ labels: MONEY, datasets:[] }, options:this.chartOptions()\n    });\n  }\n\n  bankDataset(b, i, data){\n    return {\n      label:b.name, data:data,\n      borderColor:b.color, backgroundColor:b.color+'14',\n      borderWidth:2.5, pointRadius:4.5, pointHoverRadius:7,\n      pointBackgroundColor:b.color, pointBorderColor:'#fff', pointBorderWidth:1.5,\n      tension:0.3, fill:false,\n      datalabels: Object.assign({}, DL_POS[i], {\n        color:b.color, font:{ size:9.5, weight:'700' },\n        formatter:v => v.toFixed(2)+'%', display:this.showDL,\n        backgroundColor:'rgba(255,255,255,0.92)', borderRadius:4,\n        padding:{ top:2, bottom:2, left:4, right:4 }\n      })\n    };\n  }\n  avgDataset(data){\n    return {\n      label:'Promedio', data:data, borderColor:'#B8B4AD', borderDash:[6,3],\n      borderWidth:1.5, pointRadius:2.5, pointHoverRadius:5, pointBackgroundColor:'#B8B4AD',\n      tension:0.3, fill:false, datalabels:{ display:false }\n    };\n  }\n\n  refresh(){\n    this.updateButtons();\n    this.updateNotVal();\n    this.updateSubs();\n    this.updateChart1();\n    this.updateChart2();\n    this.renderWinners();\n    this.renderAvg();\n    this.renderTable();\n    this.renderNote();\n  }\n\n  setBtns(ref, attr, val){\n    const c = this[ref].current; if (!c) return;\n    const ac = this.accent;\n    c.querySelectorAll('[data-'+attr+']').forEach(b => {\n      const on = b.dataset[attr] === String(val);\n      b.style.background = on ? ac : 'transparent';\n      b.style.color = on ? '#fff' : '#56535F';\n      b.style.boxShadow = on ? '0 1px 3px rgba(108,60,224,.30)' : 'none';\n      b.style.fontWeight = on ? '700' : '600';\n    });\n  }\n  updateButtons(){\n    this.setBtns('strikeRef','strike',this.state.strike);\n    this.setBtns('viewRef','view',this.state.view);\n    this.setBtns('matRef','mat',this.state.mat);\n  }\n  updateNotVal(){\n    const n = this.state.notional;\n    if (this.notValRef.current)\n      this.notValRef.current.textContent = Number.isInteger(n) ? `USD ${n}M` : `USD ${n.toFixed(1)}M`;\n  }\n  updateSubs(){\n    const tot = this.state.view === 'total';\n    if (this.subRef.current)\n      this.subRef.current.textContent = tot ? 'Costo total = prima + strike amortizado' : 'Sólo prima — volatilidad implícita cotizada';\n    if (this.sub2Ref.current)\n      this.sub2Ref.current.textContent = (tot ? 'Costo total' : 'Sólo prima') + ' · ' + MATS[this.state.mat].label;\n  }\n\n  updateChart1(){\n    const banks = computeBanks(this.state.strike);\n    const key = this.state.view === 'total' ? 'total_pct' : 'prima_pct';\n    const avg = MATS.map((_,mi) => banks.reduce((s,b)=>s+b[key][mi],0)/banks.length);\n    this.chart.data.datasets = [\n      ...banks.map((b,i) => this.bankDataset(b, i, b[key])),\n      this.avgDataset(avg)\n    ];\n    this.chart.update();\n  }\n  updateChart2(){\n    const key = this.state.view === 'total' ? 'total_pct' : 'prima_pct';\n    const mat = this.state.mat;\n    const series = BANKS.map((b,bi) => MONEY.map(m => computeBanks(m)[bi][key][mat]));\n    const avg = MONEY.map((_,ki) => series.reduce((s,arr)=>s+arr[ki],0)/series.length);\n    this.chart2.data.datasets = [\n      ...BANKS.map((b,i) => this.bankDataset(b, i, series[i])),\n      this.avgDataset(avg)\n    ];\n    this.chart2.update();\n  }\n\n  renderAvg(){\n    const banks = computeBanks(this.state.strike);\n    const key = this.state.view === 'total' ? 'total_pct' : 'prima_pct';\n    const avg = MATS.map((_,mi) => banks.reduce((s,b)=>s+b[key][mi],0)/banks.length);\n    const lbl = this.state.view === 'total' ? 'Promedio costo total' : 'Promedio prima';\n    this.avgRef.current.innerHTML =\n      `<span style=\"font-size:9.5px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#9A97A3;margin-right:2px;\">${lbl}<\u002Fspan>` +\n      MATS.map((m,mi) =>\n        `<div style=\"font-size:10px;font-weight:600;background:#F6F3ED;border:1px solid #E7E3DB;border-radius:6px;padding:3px 9px;color:#56535F;white-space:nowrap;font-variant-numeric:tabular-nums;\">${m.label} <b style=\"color:#1B1A22;\">${avg[mi].toFixed(2)}%<\u002Fb><\u002Fdiv>`\n      ).join('');\n  }\n\n  renderWinners(){\n    const banks = computeBanks(this.state.strike);\n    const key = this.state.view === 'total' ? 'total_pct' : 'prima_pct';\n    const ac = this.accent;\n    this.winnersRef.current.innerHTML = MATS.map((m,i) => {\n      const vals = banks.map(b => b[key][i]);\n      const min = Math.min(...vals), max = Math.max(...vals);\n      const wb = banks[vals.indexOf(min)];\n      return `<div style=\"position:relative;border:1px solid #EAE6DE;border-radius:11px;padding:12px 14px 12px 16px;background:#fff;overflow:hidden;box-shadow:0 1px 2px rgba(20,18,30,.03);\">\n        <div style=\"position:absolute;left:0;top:0;bottom:0;width:3px;background:${ac};\"><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;\">\n          <span style=\"font-size:9.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#9A97A3;\">${m.label}<\u002Fspan>\n          <span style=\"font-size:8.5px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;background:${ac}14;color:${ac};padding:2px 7px;border-radius:20px;\">↓ más barato<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:8px;\">\n          <div>\n            <div style=\"font-size:13.5px;font-weight:700;color:${wb.color};line-height:1.1;\">${wb.name}<\u002Fdiv>\n            <div style=\"font-size:10px;color:#9A97A3;margin-top:3px;font-weight:500;\">Δ vs caro <b style=\"color:#56535F;\">${(max-min).toFixed(2)} pp<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:23px;font-weight:800;letter-spacing:-0.02em;color:${wb.color};line-height:1;font-variant-numeric:tabular-nums;\">${min.toFixed(2)}%<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    }).join('');\n  }\n\n  renderNote(){\n    this.noteRef.current.innerHTML =\n      `<div style=\"font-size:9.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:${this.accent};margin-bottom:5px;\">Lectura<\u002Fdiv>${NOTES[this.state.strike]}`;\n  }\n\n  renderTable(){\n    const money = this.state.strike;\n    const banks = computeBanks(money);\n    const not = this.state.notional * 1e6;\n    const TD0 = 'padding:9px 12px;text-align:left;font-size:11.5px;color:#56535F;white-space:nowrap;border-bottom:1px solid #F2F0EC;';\n    const TD  = 'padding:9px 12px;text-align:center;border-bottom:1px solid #F2F0EC;font-variant-numeric:tabular-nums;';\n    const numS = 'font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;';\n    const pctS = 'display:block;font-size:10px;color:#9A97A3;margin-top:2px;font-weight:500;';\n    const pill = (bg,fg,t) => `<span style=\"display:inline-block;padding:1px 6px;border-radius:4px;font-size:8.5px;font-weight:700;letter-spacing:0.03em;margin-left:4px;vertical-align:middle;background:${bg};color:${fg};\">${t}<\u002Fspan>`;\n    const ac = this.accent;\n    let rows = '';\n\n    MATS.forEach((m, mi) => {\n      const yr = getYr(0, mi);\n      rows += `<tr><td colspan=\"5\" style=\"background:#F6F3ED;font-size:10px;font-weight:700;color:#8A8794;letter-spacing:0.07em;text-transform:uppercase;padding:7px 12px;border-bottom:1px solid #EDE9E2;\">${m.label} · ${yr.toFixed(3)} años<\u002Ftd><\u002Ftr>`;\n\n      const pVals = banks.map(b => b.prima_cop[mi]);\n      const pMin = Math.min(...pVals), pMax = Math.max(...pVals);\n      rows += `<tr><td style=\"${TD0}\">Prima nominal<\u002Ftd>${banks.map(b => {\n        const v = b.prima_cop[mi], pct = b.prima_pct[mi];\n        const best = Math.abs(v-pMin) < 0.05, worst = Math.abs(v-pMax) < 0.05 && pMax > pMin;\n        return `<td style=\"${TD}\"><span style=\"${numS}color:${b.color};\">${fmtCOP(v*not)}<\u002Fspan>${best?pill(ac+'1F',ac,'↓'):worst?pill('#F6E4E4','#A85A5A','↑'):''}<span style=\"${pctS}\">${pct.toFixed(2)}%/yr · ${v.toFixed(1)}/USD<\u002Fspan><\u002Ftd>`;\n      }).join('')}<\u002Ftr>`;\n\n      rows += `<tr><td style=\"${TD0}color:#9A97A3;\">Strike − Spot (OTM)<\u002Ftd>${banks.map(b => {\n        const v = b.otm_cop[mi], otmPct = (v/b.spot*100).toFixed(2);\n        return `<td style=\"${TD}\"><span style=\"${numS}color:#9A97A3;\">${fmtCOP(v*not)}<\u002Fspan><span style=\"${pctS}\">${otmPct}% · ${v.toFixed(2)}/USD<\u002Fspan><\u002Ftd>`;\n      }).join('')}<\u002Ftr>`;\n\n      const tVals = banks.map(b => b.total_cop[mi]);\n      const tMin = Math.min(...tVals), tMax = Math.max(...tVals);\n      rows += `<tr><td style=\"${TD0}border-top:1px solid #E7E3DB;font-weight:700;color:#1B1A22;\">= Costo máx. total<\u002Ftd>${banks.map(b => {\n        const v = b.total_cop[mi], pct = b.total_pct[mi];\n        const best = Math.abs(v-tMin) < 0.05, worst = Math.abs(v-tMax) < 0.05 && tMax > tMin;\n        const badge = best ? pill(ac+'1F',ac,'↓ mejor') : worst ? pill('#F6E4E4','#A85A5A','↑ caro') : pill('#F0EEE9','#8A8794','medio');\n        return `<td style=\"${TD}border-top:1px solid #E7E3DB;\"><span style=\"${numS}font-weight:800;color:${b.color};\">${fmtCOP(v*not)}<\u002Fspan>${badge}<span style=\"${pctS}\">${pct.toFixed(2)}%/yr · ${v.toFixed(1)}/USD<\u002Fspan><\u002Ftd>`;\n      }).join('')}<\u002Ftr>`;\n    });\n\n    this.tbodyRef.current.innerHTML = rows;\n  }\n\n  renderVals(){\n    this.scheduleSync();\n    return {\n      strikeRef:this.strikeRef, viewRef:this.viewRef, matRef:this.matRef,\n      chartRef:this.chartRef, chart2Ref:this.chart2Ref, tbodyRef:this.tbodyRef,\n      winnersRef:this.winnersRef, avgRef:this.avgRef, noteRef:this.noteRef,\n      notValRef:this.notValRef, subRef:this.subRef, sub2Ref:this.sub2Ref,\n      onStrike: e => this.setState({ strike: e.currentTarget.dataset.strike }),\n      onView:   e => this.setState({ view: e.currentTarget.dataset.view }),\n      onMat:    e => this.setState({ mat: parseInt(e.currentTarget.dataset.mat) }),\n      onNotional: e => this.setState({ notional: parseFloat(e.currentTarget.value) })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
