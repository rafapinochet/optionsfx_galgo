<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALL USD/COP — Curvas de Costo Anualizado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#E8ECF2; padding:16px; color:#1E293B; }
.wrap { max-width:740px; margin:0 auto; }

.hdr {
  background:#0F172A; border-radius:12px 12px 0 0;
  padding:13px 20px; display:flex; align-items:center; justify-content:space-between;
}
.hdr-title { color:#F1F5F9; font-size:13px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; }
.hdr-spots { display:flex; gap:14px; }
.hdr-spot  { font-size:11px; color:#64748B; }
.hdr-spot b { color:#CBD5E1; font-weight:600; }

.panel {
  background:#fff; border-radius:0 0 12px 12px;
  padding:18px 20px 22px; box-shadow:0 2px 12px rgba(0,0,0,.07);
}

/* controls */
.controls { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
.ctrl-lbl { font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:#94A3B8; white-space:nowrap; }
.btn-group { display:flex; border:1.5px solid #E2E8F0; border-radius:7px; overflow:hidden; }
.btn {
  padding:5px 13px; font-size:12px; font-weight:600;
  border:none; background:transparent; color:#64748B;
  cursor:pointer; transition:background .15s;
  border-right:1px solid #E2E8F0;
}
.btn:last-child { border-right:none; }
.btn:hover:not(.on-m):not(.on-v) { background:#F8FAFC; }
.on-m { background:#0F172A; color:#fff; }
.on-v { background:#EFF6FF; color:#1D4ED8; }
.vdiv { width:1px; height:26px; background:#E2E8F0; }

/* legend */
.legend { display:flex; justify-content:center; gap:20px; margin-bottom:10px; }
.leg { display:flex; align-items:center; gap:6px; font-size:11.5px; color:#334155; font-weight:500; }
.leg-ln { width:18px; height:3px; border-radius:2px; }

/* chart */
.chart-wrap { position:relative; height:290px; margin-bottom:14px; }

/* winner cards */
.winners { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:18px; }
.w-card { border:1.5px solid #E2E8F0; border-radius:9px; padding:9px 12px; text-align:center; }
.w-card .wp  { font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#94A3B8; margin-bottom:2px; }
.w-card .wb  { font-size:12px; font-weight:700; margin-bottom:1px; }
.w-card .wv  { font-size:21px; font-weight:800; letter-spacing:-.02em; line-height:1.1; margin-bottom:2px; }
.w-card .ws  { font-size:10px; color:#94A3B8; }

/* table */
.tbl-sec { font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#94A3B8; margin-bottom:7px; padding-bottom:4px; border-bottom:1px solid #F1F5F9; }
table { width:100%; border-collapse:collapse; font-size:11.5px; }
thead th {
  padding:5px 10px; font-size:9.5px; font-weight:700; text-transform:uppercase;
  letter-spacing:.05em; color:#94A3B8; border-bottom:2px solid #E2E8F0; text-align:right;
}
thead th:first-child { text-align:left; }
td { padding:6px 10px; border-bottom:1px solid #F8FAFC; text-align:right; vertical-align:middle; }
td:first-child { text-align:left; font-size:11px; color:#475569; white-space:nowrap; }
tr.sep td {
  background:#F8FAFC; font-size:10px; font-weight:700; color:#94A3B8;
  letter-spacing:.05em; text-transform:uppercase; padding:5px 10px;
}
tr.otm-row td { color:#94A3B8; }
tr.total-row td { border-top:1px solid #E2E8F0; }
.num  { font-weight:700; font-size:12px; line-height:1.1; }
.pct  { font-size:10px; font-weight:500; opacity:.75; display:block; margin-top:1px; }
.best .num { font-weight:800; }
.badge { display:inline-block; padding:1px 5px; border-radius:3px; font-size:9px; font-weight:700; letter-spacing:.04em; margin-left:3px; vertical-align:middle; }
.b-hi { background:#DCFCE7; color:#15803D; }
.b-lo { background:#FEE2E2; color:#B91C1C; }
.b-md { background:#DBEAFE; color:#1D4ED8; }

.note { margin-top:12px; font-size:10.5px; color:#64748B; background:#F8FAFC; border-left:2.5px solid #CBD5E1; border-radius:0 5px 5px 0; padding:7px 10px; line-height:1.5; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-title">CALL USD/COP — Costo Anualizado</div>
    <div class="hdr-spots">
      <div class="hdr-spot">B.Bogotá <b>3,440</b></div>
      <div class="hdr-spot">BBVA <b>3,430</b></div>
      <div class="hdr-spot">JPM <b>3,425</b></div>
    </div>
  </div>

  <div class="panel">
    <div class="controls">
      <span class="ctrl-lbl">Strike</span>
      <div class="btn-group" id="mBtns">
        <button class="btn on-m" data-m="ATM"  onclick="selM('ATM')">ATM</button>
        <button class="btn"      data-m="+5%"  onclick="selM('+5%')">+5%</button>
        <button class="btn"      data-m="+10%" onclick="selM('+10%')">+10%</button>
        <button class="btn"      data-m="+15%" onclick="selM('+15%')">+15%</button>
      </div>
      <div class="vdiv"></div>
      <span class="ctrl-lbl">Vista</span>
      <div class="btn-group" id="vBtns">
        <button class="btn on-v" data-v="total" onclick="selV('total')">Costo Total</button>
        <button class="btn"      data-v="prima" onclick="selV('prima')">Sólo Prima</button>
      </div>
    </div>

    <div class="legend">
      <div class="leg"><div class="leg-ln" style="background:#DC2626"></div>Banco Bogotá</div>
      <div class="leg"><div class="leg-ln" style="background:#2563EB"></div>BBVA</div>
      <div class="leg"><div class="leg-ln" style="background:#059669"></div>JPMorgan</div>
    </div>

    <div class="chart-wrap"><canvas id="ch"></canvas></div>
    <div class="winners" id="winners"></div>

    <div class="tbl-sec">Desglose de componentes por plazo</div>
    <table id="tbl">
      <thead><tr>
        <th style="text-align:left;width:28%">Concepto</th>
        <th id="th0"></th><th id="th1"></th><th id="th2"></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="note" id="note"></div>
  </div>
</div>

<script>
Chart.register(ChartDataLabels);

/* ── DATA ── */
const BANKS = [
  { key:'bog',  name:'Banco Bogotá', color:'#DC2626', spot:3440, yr1:1.47671 },
  { key:'bbva', name:'BBVA',         color:'#2563EB', spot:3430, yr1:1.48219 },
  { key:'jpm',  name:'JPMorgan',     color:'#059669', spot:3425, yr1:1.47945 }
];
const MATS = [
  { label:'540 días',   yr2:null  },
  { label:'720 días',   yr2:1.97260 },
  { label:'1,080 días', yr2:2.95890 }
];
const PRIMA_COP = {
  'ATM':  { bog:[494.44,584.66,759.52], bbva:[476.42,572.81,727.53], jpm:[452.10,554.85,698.70] },
  '+5%':  { bog:[399.54,490.59,669.65], bbva:[374.44,468.72,625.55], jpm:[363.05,454.84,607.94] },
  '+10%': { bog:[319.96,408.26,586.82], bbva:[291.08,379.25,531.87], jpm:[287.70,373.33,528.82] },
  '+15%': { bog:[255.30,338.43,511.78], bbva:[225.57,305.08,448.96], jpm:[224.34,306.17,452.79] }
};
const OTM_COP = {
  'ATM':  { bog:0,   bbva:0,     jpm:0      },
  '+5%':  { bog:172, bbva:171.5, jpm:171.25 },
  '+10%': { bog:344, bbva:343,   jpm:342.5  },
  '+15%': { bog:516, bbva:514.5, jpm:513.75 }
};
const NOTES = {
  'ATM':  'ATM: la componente OTM = 0, por lo que costo total = prima. Toda la diferencia entre bancos es vol implícita. JPM más barato en todos los plazos.',
  '+5%':  '+5% OTM: el componente strike se divide en años. A mayor plazo, menor peso del OTM y menor costo total anualizado.',
  '+10%': '+10% OTM: el componente strike supera a la prima en el plazo corto. JPM y BBVA son prácticamente iguales; Bogotá sigue ~0.5pp más cara.',
  '+15%': '+15% OTM: JPM y BBVA están a menos de 0.1pp entre sí. Bogotá sigue ~0.6pp/año más cara en todos los plazos.'
};

function getYr(bIdx, mIdx) { return mIdx === 0 ? BANKS[bIdx].yr1 : MATS[mIdx].yr2; }

function compute(money) {
  return BANKS.map((b, bi) =>
    Object.assign({}, b, {
      /* absolute COP/USD (nominal) */
      prima_cop: MATS.map((_,mi) => PRIMA_COP[money][b.key][mi]),
      otm_cop:   MATS.map((_,mi) => OTM_COP[money][b.key]),
      total_cop: MATS.map((_,mi) => PRIMA_COP[money][b.key][mi] + OTM_COP[money][b.key]),
      /* annualised COP/USD/yr (for chart) */
      prima_yr:  MATS.map((_,mi) => PRIMA_COP[money][b.key][mi] / getYr(bi,mi)),
      total_yr:  MATS.map((_,mi) => (PRIMA_COP[money][b.key][mi] + OTM_COP[money][b.key]) / getYr(bi,mi)),
      /* annualised % (chart + parentheticals) */
      prima_pct: MATS.map((_,mi) => PRIMA_COP[money][b.key][mi] / getYr(bi,mi) / b.spot * 100),
      total_pct: MATS.map((_,mi) => (PRIMA_COP[money][b.key][mi] + OTM_COP[money][b.key]) / getYr(bi,mi) / b.spot * 100)
    })
  );
}

let curM = 'ATM', curV = 'total';

/* ── CHART ── */
const ctx = document.getElementById('ch').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: { labels: MATS.map(m => m.label), datasets: [] },
  options: {
    responsive: true, maintainAspectRatio: false,
    animation: { duration: 350, easing: 'easeInOutQuart' },
    interaction: { mode: 'index', intersect: false },
    layout: { padding: { top: 24, right: 30, bottom: 4, left: 4 } },
    plugins: {
      legend: { display: false },
      title: {
        display: true, align: 'start',
        color: '#64748B',
        font: { size: 10, weight: '600' },
        padding: { bottom: 6 }
      },
      datalabels: { display: true },
      tooltip: {
        backgroundColor: '#0F172A', titleColor: '#94A3B8', bodyColor: '#F1F5F9',
        padding: 10, cornerRadius: 6,
        callbacks: { label: c => `  ${c.dataset.label}: ${c.parsed.y.toFixed(2)}% / año` }
      }
    },
    scales: {
      x: { grid:{ color:'#F1F5F9' }, ticks:{ font:{size:11,weight:'600'}, color:'#64748B' } },
      y: {
        grid: { color:'#F1F5F9' },
        ticks: { font:{size:11}, color:'#94A3B8', callback: v => v.toFixed(1)+'%' },
        title: { display:true, text:'%/año', font:{size:10,weight:'600'}, color:'#94A3B8' }
      }
    }
  }
});

/* ── DATALABEL POSITIONS: Bogotá=arriba, BBVA=derecha, JPM=abajo ── */
const DL_POS = [
  { align:'top',    anchor:'end',    offset:4 },
  { align:'right',  anchor:'center', offset:6 },
  { align:'bottom', anchor:'end',    offset:4 }
];

function update() {
  const banks = compute(curM);
  const pctKey = curV === 'total' ? 'total_pct' : 'prima_pct';

  chart.options.plugins.title.text = curV === 'total'
    ? '▸ Vista: Costo Total %/año  (Prima + OTM amortizado)'
    : '▸ Vista: Sólo Prima %/año  (vol implícita cotizada)';

  chart.data.datasets = banks.map((b, i) => ({
    label: b.name, data: b[pctKey],
    borderColor: b.color, backgroundColor: b.color + '14',
    borderWidth: 2.5, pointRadius: 5, pointHoverRadius: 7,
    pointBackgroundColor: b.color, tension: 0.25, fill: false,
    datalabels: {
      ...DL_POS[i],
      color: b.color,
      font: { size: 9.5, weight: '700' },
      formatter: v => v.toFixed(2) + '%',
      backgroundColor: 'rgba(255,255,255,0.85)',
      borderRadius: 3, padding: { top:1, bottom:1, left:3, right:3 }
    }
  }));
  chart.update();

  /* winner cards */
  document.getElementById('winners').innerHTML = MATS.map((m, i) => {
    const vals = banks.map(b => b[pctKey][i]);
    const min = Math.min(...vals), max = Math.max(...vals);
    const wb = banks[vals.indexOf(min)];
    return `<div class="w-card" style="border-color:${wb.color}33">
      <div class="wp">${m.label}</div>
      <div class="wb" style="color:${wb.color}">${wb.name}</div>
      <div class="wv" style="color:${wb.color}">${min.toFixed(2)}%</div>
      <div class="ws">Δ vs caro: <b>${(max-min).toFixed(2)}pp</b></div>
    </div>`;
  }).join('');

  /* table headers */
  BANKS.forEach((b,i) => {
    const th = document.getElementById('th'+i);
    th.innerHTML = `<span style="color:${b.color}">${b.name}</span>`;
    th.style.textAlign = 'center';
  });

  /* table body: 3 fixed rows per maturity block */
  let rows = '';

  MATS.forEach((m, mi) => {
    const yr = getYr(0, mi);

    /* section separator */
    rows += `<tr class="sep"><td colspan="4">── ${m.label} · ${yr.toFixed(3)} años</td></tr>`;

    /* ROW 1: prima nominal COP/USD (absolute) | (prima %/yr annualized) */
    const pVals = banks.map(b => b.prima_cop[mi]);
    const pMin  = Math.min(...pVals), pMax = Math.max(...pVals);
    rows += `<tr>
      <td>Prima nominal COP×USD</td>
      ${banks.map(b => {
        const v = b.prima_cop[mi], pct = b.prima_pct[mi];
        const best  = Math.abs(v - pMin) < 0.05;
        const worst = Math.abs(v - pMax) < 0.05 && pMax > pMin;
        return `<td class="${best ? 'best' : ''}">
          <span class="num" style="color:${b.color}">${v.toFixed(1)}</span>
          <span class="pct">(${pct.toFixed(2)}%/yr)</span>
          ${best ? '<span class="badge b-hi">↓</span>' : worst ? '<span class="badge b-lo">↑</span>' : ''}
        </td>`;
      }).join('')}
    </tr>`;

    /* ROW 2: Strike − Spot absolute (always shown, incl ATM=0) */
    rows += `<tr class="otm-row">
      <td>Strike − Spot (OTM)</td>
      ${banks.map(b => {
        const v = b.otm_cop[mi];
        const otmPct = (v / b.spot * 100).toFixed(2);
        return `<td>
          <span class="num" style="opacity:.7">${v.toFixed(2)}</span>
          <span class="pct">(${otmPct}% spot)</span>
        </td>`;
      }).join('')}
    </tr>`;

    /* ROW 3: costo máximo total = prima + OTM (absolute) | (total %/yr) */
    const tVals = banks.map(b => b.total_cop[mi]);
    const tMin  = Math.min(...tVals), tMax = Math.max(...tVals);
    rows += `<tr class="total-row">
      <td><b>= Costo Máx. Total</b></td>
      ${banks.map(b => {
        const v = b.total_cop[mi], pct = b.total_pct[mi];
        const best  = Math.abs(v - tMin) < 0.05;
        const worst = Math.abs(v - tMax) < 0.05 && tMax > tMin;
        const badge = best  ? '<span class="badge b-hi">↓ mejor</span>'
                    : worst ? '<span class="badge b-lo">↑ caro</span>'
                    :         '<span class="badge b-md">mid</span>';
        return `<td class="${best ? 'best' : ''}">
          <span class="num" style="color:${b.color}">${v.toFixed(1)}</span>
          ${badge}
          <span class="pct">(${pct.toFixed(2)}%/yr)</span>
        </td>`;
      }).join('')}
    </tr>`;
  });

  document.getElementById('tbody').innerHTML = rows;
  document.getElementById('note').textContent = '📌 ' + NOTES[curM];
}

function selM(m) {
  curM = m;
  document.querySelectorAll('#mBtns .btn').forEach(b => b.classList.toggle('on-m', b.dataset.m === m));
  update();
}
function selV(v) {
  curV = v;
  document.querySelectorAll('#vBtns .btn').forEach(b => b.classList.toggle('on-v', b.dataset.v === v));
  update();
}

update();
</script>
</body>
</html>
